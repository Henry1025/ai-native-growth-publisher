name: Publish static site

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "publish-site"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate site
        run: npm run build

      - name: Prepare public directory
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html styles.css dist/
          cp -R assets dist/
          if [ -d issues ]; then cp -R issues dist/; fi
          touch dist/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
