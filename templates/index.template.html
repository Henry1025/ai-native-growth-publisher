<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{documentTitle}}</title>
    <meta name="description" content="{{description}}" />
    <link rel="stylesheet" href="{{stylesheetHref}}" />
  </head>
  <body>
    <header class="masthead" id="top">
      <div class="utility-row">
        <span>{{date}}</span>
        <span>{{category}}</span>
      </div>
      <a class="nameplate" href="{{homeHref}}" aria-label="Return home">{{siteTitle}}</a>
    </header>

    <main>
      <section class="front-page" aria-labelledby="frontTitle">
        <div class="lead-copy">
          <p class="kicker">{{eyebrow}}</p>
          <h1 id="frontTitle">{{issue}}</h1>
        </div>
        <aside class="today-list" aria-label="News overview">
          <h2>{{sectionTitle}}</h2>
{{articleCards}}
        </aside>
      </section>
{{archiveSection}}
    </main>

    <footer class="site-footer">
      <p>{{footer}}</p>
    </footer>
  </body>
</html>
